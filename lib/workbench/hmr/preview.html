<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workbench HMR Preview</title>
    <script>
      (() => {
        const root = document.documentElement;

        function applyTheme(theme) {
          const normalized = theme === "dark" ? "dark" : "light";
          root.setAttribute("data-theme", normalized);
          root.classList.remove("dark", "light");
          root.classList.add(normalized);
        }

        const theme = "dark";
        applyTheme(theme);

        // Keep shell theme in sync from host globals payloads.
        window.addEventListener("message", (event) => {
          const message = event.data;
          if (!message || typeof message !== "object") return;
          if (message.type !== "OPENAI_SET_GLOBALS") return;
          // Cache for the OpenAI shim which installs after this inline script.
          window.__OPENAI_INITIAL_GLOBALS = message.globals;
          const next =
            message.globals?.previewTheme || message.globals?.theme || theme;
          applyTheme(next);
        });
      })();
    </script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        color: var(--foreground, #f5f5f5);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./runtime-entry.tsx"></script>
  </body>
</html>
